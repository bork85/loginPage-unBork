<!doctype html>
<html lang="PT-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=favorite"
    />
    <title>Login - unBork</title>
    <link
      rel="shortcut icon"
      href="./assets/lateral-cartao.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <div class="imagem-bg">
        <p>
          Feito com <span class="material-symbols-outlined"> favorite </span>
        </p>
        <p>Copyrigth @ 2026 - unBork</p>
        <p>Todos os direitos reservados</p>
      </div>
      <div class="form-login">
        <img src="./assets/logo-unBork.png" alt="logo-dev" />
        <div class="form-item">
          <label for="email">E-mail</label>
          <input type="email" name="email" id="email" />
        </div>
        <div class="form-item">
          <label for="password">Senha</label>
          <input type="password" name="password" id="password" />
        </div>
        <div class="checkbox-div">
          <input type="checkbox" name="remember" id="remember" />
          <label for="remember">Lembrar de mim</label>
        </div>
        <button type="submit">Entrar</button>
        <a href="#">Esqueceu sua senha?</a>
      </div>
    </main>
    <img src="./assets/whatsapp.png" alt="logo-whatsapp" class="whatsapp-img" />
  </body>
</html>
